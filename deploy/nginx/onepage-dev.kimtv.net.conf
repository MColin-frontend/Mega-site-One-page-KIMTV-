# =====================================================================
# nginx vhost cho onepage-dev.kimtv.net → proxy vào app container (127.0.0.1:3000).
#
# Cài trên server:
#   sudo cp onepage-dev.kimtv.net.conf /etc/nginx/conf.d/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Cert/key TLS do bạn tự đặt sẵn trên server (KHÔNG commit vào repo), mặc định:
#   /etc/nginx/ssl/onepage-dev.kimtv.net/fullchain.pem   (certificate)
#   /etc/nginx/ssl/onepage-dev.kimtv.net/privkey.pem     (private key)
# Sửa 2 đường dẫn dưới nếu bạn đặt chỗ khác.
# =====================================================================

# Map cho WebSocket upgrade (tên biến riêng để không đụng map sẵn có trên server).
map $http_upgrade $onepage_conn_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name onepage-dev.kimtv.net;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    # http2 khai báo trên listen (tương thích nginx cũ < 1.25.1, vd 1.18 trên server).
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name onepage-dev.kimtv.net;

    ssl_certificate     /etc/nginx/ssl/onepage-dev.kimtv.net/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/onepage-dev.kimtv.net/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Next.js phục vụ ảnh/asset lớn — nới giới hạn upload nếu cần.
    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Hỗ trợ WebSocket (nếu về sau proxy ws qua domain này).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $onepage_conn_upgrade;

        proxy_read_timeout 60s;
    }
}
