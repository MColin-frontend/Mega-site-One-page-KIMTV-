name: Staging CI/CD

# Push/merge vào `staging`  → CI + build image (GHCR) + deploy qua SSH.
# Pull request tới `staging` → chỉ chạy CI (lint + typecheck).
on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]
  workflow_dispatch:

# Không chạy chồng deploy khi push liên tiếp — huỷ run cũ của cùng nhánh.
concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # Không dùng ${{ github.repository }} vì tên repo kết thúc bằng "-" → image reference
  # không hợp lệ (path phải kết thúc bằng ký tự alphanumeric). Pin tên hợp lệ, chữ thường.
  IMAGE_NAME: mcolin-frontend/mega-site-one-page-kimtv

jobs:
  # --------------------------------------------------------------------------
  ci:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci
        env:
          HUSKY: 0

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  # --------------------------------------------------------------------------
  build-and-push:
    name: Build & Push image (GHCR)
    runs-on: ubuntu-latest
    needs: ci
    # Chỉ build/push khi thực sự đẩy code vào staging (không chạy cho PR).
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_WS_BASE_URL=${{ vars.NEXT_PUBLIC_WS_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------------------------
  deploy:
    name: Deploy to server (SSH)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: SSH → pull & restart container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          # Đẩy biến vào phiên SSH (GITHUB_TOKEN còn hiệu lực trong lúc run
          # → server login GHCR để pull image private, không cần lưu PAT).
          envs: GHCR_USER,GHCR_TOKEN,DEPLOY_DIR
          script: |
            set -e
            cd "${DEPLOY_DIR:-/opt/onepage-dev}"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f
            docker logout ghcr.io
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
